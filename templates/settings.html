<div id="extension_settings_nicknames">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b data-i18n="Nicknames">Nicknames</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container flexFlowColumn">
                <small data-i18n="Configure where nicknames should be used throughout SillyTavern.">
                    Configure where nicknames should be used throughout SillyTavern.
                </small>
                <label class="checkbox_label" for="nicknames_use_for_char_list">
                    <input type="checkbox" id="nicknames_use_for_char_list" />
                    <span title="Display nicknames instead of original names in the character list."
                        data-i18n="Character list">Character list</span>
                </label>
                <label class="checkbox_label" for="nicknames_use_for_chat_messages">
                    <input type="checkbox" id="nicknames_use_for_chat_messages" />
                    <span title="Use nicknames as sender names for chat messages."
                        data-i18n="Chat messages">Chat messages</span>
                </label>
                <label class="checkbox_label" for="nicknames_use_for_macros">
                    <input type="checkbox" id="nicknames_use_for_macros" />
                    <span title="Replace &#123;&#123;user&#125;&#125; and &#123;&#123;char&#125;&#125; macros with nicknames in prompts sent to the AI."
                        data-i18n="Macros & prompts (&#123;&#123;user&#125;&#125;/&#123;&#123;char&#125;&#125;)">Macros & prompts (&#123;&#123;user&#125;&#125;/&#123;&#123;char&#125;&#125;)</span>
                </label>
            </div>
        </div>
    </div>
</div>
